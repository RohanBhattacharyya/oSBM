name: iOS IPA Build (Manual)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: iOS build configuration
        required: true
        type: choice
        options:
          - Release
          - Debug
        default: Release

permissions:
  contents: read

env:
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/bincache
  VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.cache/vcpkg/bincache,readwrite
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPRESS: "true"
  CCACHE_MAXSIZE: 2G

jobs:
  build_ios_ipa:
    name: Build iOS ARM64 IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore vcpkg binary cache
        id: restore-vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/vcpkg/bincache
          key: ${{ runner.os }}-ios-vcpkg-${{ hashFiles('source/vcpkg.json', 'source/vcpkg-configuration.json', 'triplets/**') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ios-vcpkg-${{ hashFiles('source/vcpkg.json', 'source/vcpkg-configuration.json', 'triplets/**') }}-
            ${{ runner.os }}-ios-vcpkg-

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .cache/ccache
          key: ${{ runner.os }}-ios-ccache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ios-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ios-ccache-

      - name: Setup ccache
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.cache/ccache" "${GITHUB_WORKSPACE}/.cache/vcpkg/bincache"
          if ! command -v ccache >/dev/null 2>&1; then
            brew install ccache
          fi
          ccache --version
          ccache --zero-stats || true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "**/source/vcpkg.json"
          vcpkgConfigurationJsonGlob: "**/source/vcpkg-configuration.json"

      - name: Enforce vcpkg binary cache path
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.cache/vcpkg/bincache"
          echo "VCPKG_DEFAULT_BINARY_CACHE=${GITHUB_WORKSPACE}/.cache/vcpkg/bincache" >> "${GITHUB_ENV}"

      - name: Configure CMake (iOS/Xcode)
        run: |
          IOS_CONFIG="${{ inputs.configuration }}"
          echo "IOS_CONFIG=${IOS_CONFIG}" >> "${GITHUB_ENV}"

          cmake -S source -B build/ios-arm64-ipa \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_OVERLAY_TRIPLETS="${GITHUB_WORKSPACE}/triplets" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OBJC_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OBJCXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE="${IOS_CONFIG}" \
            -DVCPKG_TARGET_TRIPLET=arm64-ios-mixed \
            -DSTAR_ENABLE_STEAM_INTEGRATION=OFF \
            -DSTAR_ENABLE_DISCORD_INTEGRATION=OFF \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_IDENTITY=""

      - name: Build iOS app bundle
        run: cmake --build build/ios-arm64-ipa --config "${IOS_CONFIG}" --parallel --target starbound

      - name: ccache stats
        if: always()
        run: ccache --show-stats || true

      - name: Save ccache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: .cache/ccache
          key: ${{ steps.restore-ccache.outputs.cache-primary-key }}

      - name: Save vcpkg binary cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: .cache/vcpkg/bincache
          key: ${{ steps.restore-vcpkg-cache.outputs.cache-primary-key }}

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          APP_PATH=""
          for CANDIDATE in \
            "${GITHUB_WORKSPACE}/dist/starbound.app" \
            "${GITHUB_WORKSPACE}/build/ios-arm64-ipa/build/Release-iphoneos/starbound.app" \
            "${GITHUB_WORKSPACE}/build/ios-arm64-ipa/Release-iphoneos/starbound.app"; do
            if [ -d "${CANDIDATE}" ]; then
              APP_PATH="${CANDIDATE}"
              break
            fi
          done

          if [ -z "${APP_PATH}" ]; then
            SEARCH_ROOTS=()
            if [ -d "${GITHUB_WORKSPACE}/build/ios-arm64-ipa" ]; then
              SEARCH_ROOTS+=("${GITHUB_WORKSPACE}/build/ios-arm64-ipa")
            fi
            if [ -d "${GITHUB_WORKSPACE}/dist" ]; then
              SEARCH_ROOTS+=("${GITHUB_WORKSPACE}/dist")
            fi

            if [ "${#SEARCH_ROOTS[@]}" -gt 0 ]; then
              APP_PATH="$(find "${SEARCH_ROOTS[@]}" -type d \( -name 'starbound.app' -o -name 'OpenStarbound.app' \) | head -n 1 || true)"
            fi
          fi

          if [ -z "${APP_PATH}" ]; then
            echo "No starbound .app bundle found after iOS build." >&2
            echo "Discovered .app bundles:" >&2
            SEARCH_ROOTS=()
            if [ -d "${GITHUB_WORKSPACE}/build/ios-arm64-ipa" ]; then
              SEARCH_ROOTS+=("${GITHUB_WORKSPACE}/build/ios-arm64-ipa")
            fi
            if [ -d "${GITHUB_WORKSPACE}/dist" ]; then
              SEARCH_ROOTS+=("${GITHUB_WORKSPACE}/dist")
            fi
            if [ "${#SEARCH_ROOTS[@]}" -gt 0 ]; then
              find "${SEARCH_ROOTS[@]}" -type d -name '*.app' >&2 || true
            fi
            exit 1
          fi

          echo "Using app bundle: ${APP_PATH}"

          if [ ! -f "${APP_PATH}/Info.plist" ]; then
            echo "Selected app bundle is missing Info.plist: ${APP_PATH}" >&2
            exit 1
          fi

          APP_EXECUTABLE="$(
            /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "${APP_PATH}/Info.plist" 2>/dev/null || true
          )"
          if [ -z "${APP_EXECUTABLE}" ] || [ ! -f "${APP_PATH}/${APP_EXECUTABLE}" ]; then
            echo "Selected app bundle has no valid executable entry in Info.plist: ${APP_PATH}" >&2
            exit 1
          fi

          APP_EXEC_SIZE="$(stat -f%z "${APP_PATH}/${APP_EXECUTABLE}")"
          if [ "${APP_EXEC_SIZE}" -lt 500000 ]; then
            echo "Selected app executable is unexpectedly small (${APP_EXEC_SIZE} bytes): ${APP_PATH}/${APP_EXECUTABLE}" >&2
            exit 1
          fi

          IPA_DIR="${GITHUB_WORKSPACE}/build/ios-arm64-ipa/ipa"
          PAYLOAD_DIR="${IPA_DIR}/Payload"
          APP_BASENAME="$(basename "${APP_PATH}")"
          IPA_PATH="${IPA_DIR}/OpenStarbound-iOS-${IOS_CONFIG}-unsigned.ipa"

          rm -rf "${IPA_DIR}"
          mkdir -p "${PAYLOAD_DIR}"
          cp -R "${APP_PATH}" "${PAYLOAD_DIR}/${APP_BASENAME}"

          (
            cd "${IPA_DIR}"
            /usr/bin/zip -qry "${IPA_PATH}" Payload
          )

          echo "IPA_PATH=${IPA_PATH}" >> "${GITHUB_ENV}"
          shasum -a 256 "${IPA_PATH}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenStarbound-iOS-${{ inputs.configuration }}-unsigned-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error

      - name: Upload iOS build logs
        uses: actions/upload-artifact@v4
        with:
          name: OpenStarbound-iOS-build-logs
          path: |
            build/ios-arm64-ipa/CMakeCache.txt
            build/ios-arm64-ipa/CMakeFiles/CMakeOutput.log
            build/ios-arm64-ipa/CMakeFiles/CMakeError.log
          if-no-files-found: warn
