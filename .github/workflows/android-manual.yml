name: Android Build (Manual)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Android build type
        required: true
        type: choice
        options:
          - Release
          - Debug
        default: Release
      arch:
        description: Target architecture (universal builds all ABIs into one APK plus the per-ABI APKs)
        required: true
        type: choice
        options:
          - arm64
          - armv7
          - x86_64
          - universal
        default: arm64

permissions:
  contents: read

env:
  # The NDK is reinstalled every run, so its clang gets a fresh mtime and
  # ccache's default mtime-based compiler check misses 100% of the time
  # (measured: 0/1398 hits on a fully warm cache). Hash compiler contents
  # instead -- stable across installs of the same NDK version.
  CCACHE_COMPILERCHECK: content

jobs:
  build_android:
    name: Build Android APK (${{ inputs.arch }})
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            make \
            ninja-build \
            pkg-config \
            perl \
            unzip \
            zip

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.3.11579264"
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.3.11579264" >> "${GITHUB_ENV}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      # Release APKs sign with the default debug signingConfig, so the
      # signing identity IS ~/.android/debug.keystore. Restore the same
      # keystore the published releases were signed with -- without this
      # every runner mints a fresh key and users hit
      # INSTALL_FAILED_UPDATE_INCOMPATIBLE on upgrade.
      - name: Restore release signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
          # Public cert fingerprint of the key every published release is
          # signed with (fingerprints are not secret). If the restored
          # keystore doesn't produce this, fail here in seconds instead of
          # shipping an APK existing users can't install over.
          EXPECTED_SHA256: "6F:31:13:89:82:35:1C:A7:08:66:2C:36:B7:45:C2:9F:A6:E5:53:BB:88:5B:C9:DA:F3:C8:64:12:45:D0:D4:A5"
        run: |
          if [ -z "${KEYSTORE_B64}" ]; then
            echo "ANDROID_DEBUG_KEYSTORE_B64 secret is not set; APKs would get a throwaway signature users cannot upgrade onto." >&2
            exit 1
          fi
          mkdir -p "${HOME}/.android"
          echo "${KEYSTORE_B64}" | base64 -d > "${HOME}/.android/debug.keystore"
          ACTUAL=$(keytool -list -v -keystore "${HOME}/.android/debug.keystore" -alias androiddebugkey -storepass android 2>/dev/null | sed -n 's/.*SHA256: //p' | head -1)
          echo "restored keystore cert SHA256: ${ACTUAL}"
          if [ "${ACTUAL}" != "${EXPECTED_SHA256}" ]; then
            echo "Restored keystore does not match the release signing certificate (expected ${EXPECTED_SHA256}); the secret is missing, stale, or corrupt." >&2
            exit 1
          fi
          # Explicit path for gradle's signing config -- AGP's default debug
          # keystore resolution silently regenerates a random key when its
          # path misses; the explicit config hard-fails instead.
          echo "STAR_SIGNING_KEYSTORE=${HOME}/.android/debug.keystore" >> "${GITHUB_ENV}"

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: android-${{ inputs.arch }}-${{ inputs.build_type }}
          max-size: 2G

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "**/source/vcpkg.json"
          vcpkgConfigurationJsonGlob: "**/source/vcpkg-configuration.json"

      - name: Select CMake presets
        run: |
          echo "OSBM_VERSION=$(tr -d ' \n' < VERSION)" >> "${GITHUB_ENV}"

          if [ "${{ inputs.build_type }}" = "Debug" ]; then
            SUFFIX=debug
            if [ "${{ inputs.arch }}" = "universal" ]; then
              echo "Universal APKs are release-only; pick a single arch for Debug builds." >&2
              exit 1
            fi
          else
            SUFFIX=release
          fi

          case "${{ inputs.arch }}" in
            arm64)
              echo "CMAKE_PRESETS=android-arm64-${SUFFIX}" >> "${GITHUB_ENV}"
              ;;
            armv7)
              echo "CMAKE_PRESETS=android-armv7-${SUFFIX}" >> "${GITHUB_ENV}"
              ;;
            x86_64)
              echo "CMAKE_PRESETS=android-x64-${SUFFIX}" >> "${GITHUB_ENV}"
              ;;
            universal)
              echo "CMAKE_PRESETS=android-armv7-release android-arm64-release android-x64-release" >> "${GITHUB_ENV}"
              ;;
          esac

      # Each gradle run clears other APKs from the variant outputs dir, so
      # stage every APK immediately after the build that produced it.
      - name: Build per-ABI APKs
        working-directory: source
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/apk-staging"
          if [ "${{ inputs.build_type }}" = "Debug" ]; then
            APK_DIR=application/mobile/android/host/app/build/outputs/apk/debug
          else
            APK_DIR=application/mobile/android/host/app/build/outputs/apk/release
          fi
          for PRESET in ${CMAKE_PRESETS}; do
            echo "::group::${PRESET}"
            cmake --preset "${PRESET}" -DVCPKG_INSTALL_OPTIONS=--clean-after-build \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake --build --preset "${PRESET}" --target android_apk --parallel
            cp -v "${APK_DIR}"/oSBM-*.apk "${GITHUB_WORKSPACE}/apk-staging/"
            echo "::endgroup::"
          done

      - name: Build universal APK
        if: ${{ inputs.arch == 'universal' }}
        working-directory: source
        run: |
          cmake --build --preset android-universal-release
          cp -v application/mobile/android/host/app/build/outputs/apk/release/oSBM-*.apk "${GITHUB_WORKSPACE}/apk-staging/"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: oSBM-${{ env.OSBM_VERSION }}-android-${{ inputs.arch }}-${{ inputs.build_type }}
          path: apk-staging/oSBM-*.apk
          if-no-files-found: error
