name: Android Build (Manual)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Android build type
        required: true
        type: choice
        options:
          - Release
          - Debug
        default: Release
      arch:
        description: Target architecture (universal builds all ABIs into one APK plus the per-ABI APKs)
        required: true
        type: choice
        options:
          - arm64
          - armv7
          - x86_64
          - universal
        default: arm64

permissions:
  contents: read

jobs:
  build_android:
    name: Build Android APK (${{ inputs.arch }})
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            make \
            ninja-build \
            pkg-config \
            perl \
            unzip \
            zip

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.3.11579264"
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.3.11579264" >> "${GITHUB_ENV}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "**/source/vcpkg.json"
          vcpkgConfigurationJsonGlob: "**/source/vcpkg-configuration.json"

      - name: Select CMake presets
        run: |
          echo "OSBM_VERSION=$(tr -d ' \n' < VERSION)" >> "${GITHUB_ENV}"

          if [ "${{ inputs.build_type }}" = "Debug" ]; then
            SUFFIX=debug
            if [ "${{ inputs.arch }}" = "universal" ]; then
              echo "Universal APKs are release-only; pick a single arch for Debug builds." >&2
              exit 1
            fi
          else
            SUFFIX=release
          fi

          case "${{ inputs.arch }}" in
            arm64)
              echo "CMAKE_PRESETS=android-arm64-${SUFFIX}" >> "${GITHUB_ENV}"
              ;;
            armv7)
              echo "CMAKE_PRESETS=android-armv7-${SUFFIX}" >> "${GITHUB_ENV}"
              ;;
            x86_64)
              echo "CMAKE_PRESETS=android-x64-${SUFFIX}" >> "${GITHUB_ENV}"
              ;;
            universal)
              echo "CMAKE_PRESETS=android-armv7-release android-arm64-release android-x64-release" >> "${GITHUB_ENV}"
              ;;
          esac

      # Each gradle run clears other APKs from the variant outputs dir, so
      # stage every APK immediately after the build that produced it.
      - name: Build per-ABI APKs
        working-directory: source
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/apk-staging"
          if [ "${{ inputs.build_type }}" = "Debug" ]; then
            APK_DIR=application/mobile/android/host/app/build/outputs/apk/debug
          else
            APK_DIR=application/mobile/android/host/app/build/outputs/apk/release
          fi
          for PRESET in ${CMAKE_PRESETS}; do
            echo "::group::${PRESET}"
            cmake --preset "${PRESET}" -DVCPKG_INSTALL_OPTIONS=--clean-after-build
            cmake --build --preset "${PRESET}" --target android_apk --parallel
            cp -v "${APK_DIR}"/oSBM-*.apk "${GITHUB_WORKSPACE}/apk-staging/"
            echo "::endgroup::"
          done

      - name: Build universal APK
        if: ${{ inputs.arch == 'universal' }}
        working-directory: source
        run: |
          cmake --build --preset android-universal-release
          cp -v application/mobile/android/host/app/build/outputs/apk/release/oSBM-*.apk "${GITHUB_WORKSPACE}/apk-staging/"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: oSBM-${{ env.OSBM_VERSION }}-android-${{ inputs.arch }}-${{ inputs.build_type }}
          path: apk-staging/oSBM-*.apk
          if-no-files-found: error
